<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Prode Mundial 2026 - Predecí los resultados de todos los partidos del Mundial FIFA 2026. Creá torneos con amigos y compitan por el primer puesto.">
    <title>🏆 Podale Mundial 2026 | 🇲🇽 🇺🇸 🇨🇦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- ANIMATED BACKGROUND -->
    <div class="bg-decoration">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- NAME MODAL -->
    <div class="modal-overlay" id="name-modal">
        <div class="modal-card">
            <div class="modal-icon">⚽</div>
            <h2 class="modal-title">¡Bienvenido al Prode!</h2>
            <p class="modal-text">Ingresá tu nombre o apodo para empezar</p>
            <input type="text" id="player-name-input" class="modal-input" placeholder="Tu nombre..." maxlength="20"
                onkeypress="if(event.key==='Enter') savePlayerName()" autofocus />
            <button class="btn-gradient modal-btn" onclick="savePlayerName()">🚀 ¡Empezar!</button>
        </div>
    </div>

    <!-- COMPARISON MODAL -->
    <div class="modal-overlay" id="compare-modal" onclick="if(event.target===this) closeCompareModal()">
        <div class="modal-card comparison-modal-card">
            <div class="compare-modal-header">
                <h2 class="modal-title" id="compare-modal-title">Comparar Predicciones</h2>
                <button class="modal-close-btn" onclick="closeCompareModal()">×</button>
            </div>
            <div class="compare-modal-body" id="compare-modal-body">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <!-- SIDEBAR MENU -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="logo-icon">🏆</div>
                <div class="logo-text">
                    <h1>Prode Mundial <span class="year">2026</span></h1>
                    <span class="logo-sub">🇲🇽 🇺🇸 🇨🇦</span>
                </div>
            </div>
            <button class="sidebar-close" onclick="closeMenu()">✕</button>
        </div>
        <nav class="sidebar-nav">
            <button class="sidebar-btn active" data-section="partidos" onclick="navigateTo('partidos', this)">
                <span class="sidebar-icon">⚽</span>
                <span class="sidebar-label">Partidos</span>
            </button>
            <button class="sidebar-btn" data-section="prode" onclick="navigateTo('prode', this)">
                <span class="sidebar-icon">🎯</span>
                <span class="sidebar-label">Prode</span>
            </button>
            <button class="sidebar-btn" data-section="predicciones" onclick="navigateTo('predicciones', this)">
                <span class="sidebar-icon">🤖</span>
                <span class="sidebar-label">Predicciones</span>
                <span class="sidebar-badge">IA</span>
            </button>
            <button class="sidebar-btn" data-section="tabla" onclick="navigateTo('tabla', this)">
                <span class="sidebar-icon">📊</span>
                <span class="sidebar-label">Mi Tabla</span>
            </button>
            <button class="sidebar-btn" data-section="torneos" onclick="navigateTo('torneos', this)">
                <span class="sidebar-icon">🏆</span>
                <span class="sidebar-label">Torneos</span>
            </button>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-player">
                <span class="sidebar-player-name" id="sidebar-player-name">Jugador</span>
                <div class="sidebar-points">
                    <span class="sidebar-points-label">Puntos</span>
                    <span class="sidebar-points-value" id="sidebar-points">0</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <button class="menu-btn" id="menu-btn" onclick="toggleMenu()" aria-label="Menú">
                <span class="menu-line"></span>
                <span class="menu-line"></span>
                <span class="menu-line"></span>
            </button>
            <div class="header-brand">
                <div class="logo-icon">🏆</div>
                <div class="logo-text">
                    <h1>Prode Mundial <span class="year">2026</span></h1>
                    <span class="logo-sub">🇲🇽 🇺🇸 🇨🇦</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="player-badge">
                    <span class="player-name" id="header-player-name">Jugador</span>
                </div>
                <div class="points-display">
                    <span class="points-label">Puntos</span>
                    <span class="points-value" id="header-points">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main" id="main-content">
        <div class="loader-container">
            <div class="loader"></div>
            <p>Cargando partidos...</p>
        </div>
    </main>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="admin-panel" style="display: none;">
        <div class="admin-header">
            <h2>⚙️ Panel de Control (En Vivo)</h2>
            <button class="btn-small btn-close-admin" onclick="document.getElementById('admin-panel').style.display='none'">Cerrar</button>
        </div>
        <div id="admin-matches-list" class="admin-matches-list">
            <!-- Se llena con JS -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-inner">
            <p>⚽ Prode Mundial 2026 </p>
            <p class="footer-sub">Alejo Jaime</p>
        </div>
    </footer>

    <!-- FIREBASE SDK (compat for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="teams-data.js"></script>
    <script src="app.js"></script>
</body>

</html>
